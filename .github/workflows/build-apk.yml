name: Build and release APK

on:
  release:
    types: [published]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - name: Decode keystore
        working-directory: android/app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > dashy-upload.keystore

      - name: Configure signing and ABI split
        working-directory: android/app
        run: |
          cat >> build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("dashy-upload.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
              splits {
                  abi {
                      enable true
                      reset()
                      include "arm64-v8a", "armeabi-v7a", "x86_64"
                      universalApk false
                  }
              }
          }
          EOF

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          mkdir -p artifacts
          for apk in android/app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk")
            # filename looks like: app-arm64-v8a-release.apk
            abi=$(echo "$filename" | sed -E 's/app-(.+)-release\.apk/\1/')
            cp "$apk" "artifacts/DashyMobile-v${VERSION}-${abi}.apk"
          done
          ls -lh artifacts

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
